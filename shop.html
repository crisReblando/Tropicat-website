<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TropiCat Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="shop-page">
    <header>
        <div class="header-top">
            <a href="index.html" class="logo-link"><div class="logo">TropiCat <span>BITES</span></div></a>
            <div class="account-links"><a href="index.html">← Back</a></div>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">Checkout</h2>
        <div class="checkout-container">
            <div class="checkout-main">
                <div class="checkout-card">
                    <h3>1. Review Items</h3>
                    <div id="cart-display">
                        </div>
                </div>
                <div class="checkout-card" style="margin-top:20px;">
                    <h3>2. Shipping</h3>
                    <input type="text" placeholder="Address" style="width:100%; padding:10px; margin-top:10px;">
                </div>
            </div>
            <div class="checkout-sidebar">
                <div class="checkout-card">
                    <h3>3. Payment</h3>
                    <label><input type="radio" name="p" checked> GCash</label><br>
                    <label><input type="radio" name="p"> COD</label>
                    <hr>
                    <p id="total-price-display">Total: ₱0.00</p>
                    <button class="btn-confirm-order" onclick="confirm()">PLACE ORDER</button>
                </div>
            </div>
        </div>

        <div id="orderConfirmation" class="confirmation-overlay" style="display:none;">
            <div class="confirm-box">
                <div class="success-icon">✔</div>
                <h2>Confirmed!</h2>
                <button class="btn-add" onclick="clearCart()">Home</button>
            </div>
        </div>
    </main>

    <script>
        function loadCart() {
            let count = localStorage.getItem('cartItems') || 0;
            let total = localStorage.getItem('totalPrice') || 0;
            const display = document.getElementById('cart-display');
            
            if(count > 0) {
                display.innerHTML = `
                    <p>Items: ${count}</p>
                    <p>Total: ₱${total}.00</p>
                    <button onclick="remove()" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer;">Remove All</button>
                `;
                document.getElementById('total-price-display').innerText = `Total: ₱${total}.00`;
            } else {
                display.innerHTML = "<p>Cart is empty.</p>";
            }
        }

        function remove() {
            localStorage.clear();
            loadCart();
        }

        function confirm() {
            document.getElementById('orderConfirmation').style.display = 'flex';
        }

        function clearCart() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadCart();
    </script>
</body>
</html>
